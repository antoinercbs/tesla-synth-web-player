name: Build and publish Docker image

# Builds the single-container image (Dockerfile at the repo root) and publishes
# it to the GitHub Container Registry (GHCR):
#   ghcr.io/antoinercbs/tesla-synth-web-player
#
# - push to `main`            -> pushes the `latest` + `main` + `sha-<short>` tags
# - push a tag `vX.Y.Z`       -> pushes `X.Y.Z`, `X.Y`, and `latest`
# - pull request to `main`    -> builds only (validates the Dockerfile), no push
# - manual run (workflow_dispatch from any branch) -> builds + pushes branch tags
#
# The image is pushed using the built-in GITHUB_TOKEN — no extra secrets needed.
# After the first successful push, make the package public in
# GitHub → repo → Packages → tesla-synth-web-player → Package settings → Visibility
# if you want anyone to `docker pull` it without authenticating.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Don't run stale builds on top of each other for the same ref.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # owner/repo, already lowercase

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Don't log in on pull requests from forks (no package write there anyway).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Build (and cache) on every event; only push when it isn't a PR.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # linux/amd64 only by default (fast, covers most servers). To also build
          # for ARM (e.g. a Raspberry Pi / ARM VPS), add a `docker/setup-qemu-action`
          # step above and set: platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
