services:
  tesla-player:
    build: .
    ports:
      # host:container — change the host port to put the app behind a reverse proxy
      - "5000:5000"
    environment:
      - PORT=5000
      - DATA_ROOT=/data
    volumes:
      # persists the SQLite database and the uploaded MIDI files across rebuilds
      - ./data:/data
    restart: unless-stopped
